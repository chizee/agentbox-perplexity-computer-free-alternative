services:
  manager:
    build: ./manager
    ports:
      - "4000:4000"   # REST API
      - "4001:4001"   # MCP SSE
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MANAGER_URL=http://localhost:4000
    restart: unless-stopped

networks:
  default:
    name: agentbox-net
    driver: bridge
